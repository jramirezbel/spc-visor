<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Control SPC - v2.1</title>
    
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 20px; background-color: #f4f7f6; color: #333; }
        .header-container { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .panel-reportes { background: white; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; width: 200px; }
        .btn-descargar { background: #38a169; color: white; border: none; padding: 8px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 5px; }
        .btn-limpiar { background: #e53e3e; color: white; border: none; padding: 4px; width: 100%; border-radius: 6px; cursor: pointer; font-size: 10px; }

        .tabs-container { display: flex; gap: 10px; margin-bottom: 15px; background: white; padding: 10px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .tab-btn { padding: 10px 15px; border: none; background: #edf2f7; color: #4a5568; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: #3182ce; color: white; }

        #meses-filtros { margin-bottom: 15px; }
        #meses-filtros button { padding: 6px 12px; margin: 2px; cursor: pointer; background: white; border: 1px solid #cbd5e0; border-radius: 6px; }
        
        #stats-bar { display: flex; justify-content: space-around; background: white; padding: 20px; border-bottom: 2px solid #f1f5f9; }
        .stat-card { text-align: center; flex: 1; border-right: 1px solid #f1f5f9; }
        .stat-card:last-child { border-right: none; }
        .stat-label { display: block; font-size: 11px; color: #64748b; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 28px; font-weight: bold; color: #1e293b; }

        .layout-principal { display: flex; gap: 20px; height: 600px; }
        .visor-container { flex: 7; border: 1px solid #e2e8f0; background: white; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .canvas-scroll { flex: 1; overflow-x: auto; background: white; }
        #myDiv { min-height: 400px; }

        .panel-lateral { flex: 3; background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; overflow-y: auto; }
        .badge-lote { background: #e53e3e; color: white; padding: 6px 12px; border-radius: 20px; font-weight: bold; display: inline-block; margin-bottom: 15px; }
        .step { display: block; background: #f8fafc; padding: 10px; margin-bottom: 8px; border-radius: 8px; font-size: 12px; border: 1px solid #edf2f7; }
        
        #btnEnviar { width: 100%; padding: 14px; margin-top: 10px; background: #ccc; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: not-allowed; }
        #btnEnviar.active { background: #38a169; cursor: pointer; }
        .btn-cancelar { width: 100%; padding: 10px; margin-top: 8px; background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; border-radius: 8px; cursor: pointer; }
        .contenido-oculto { display: none; }
        .placeholder-text { display: flex; align-items: center; justify-content: center; height: 100%; color: #a0aec0; text-align: center; }
    </style>
</head>
<body>

    <div class="header-container">
        <div><h2>Visor de SICs - Control Chart</h2></div>
        <div class="panel-reportes">
            <button onclick="descargarReportes()" class="btn-descargar">📥 Descargar CSV</button>
            <button onclick="limpiarBaseDatos()" class="btn-limpiar">🗑️ Borrar Historial</button>
        </div>
    </div>
    
    <div class="tabs-container">
        <button class="tab-btn active" onclick="cambiarVariable('Consumo agua recuperada')">Consumo agua recuperada</button>
        <button class="tab-btn" onclick="cambiarVariable('Consumo agua potable')">Consumo agua potable</button>
        <button class="tab-btn" onclick="cambiarVariable('Pasamalla Malta')">Pasamalla Malta</button>
        <button class="tab-btn" onclick="cambiarVariable('Pasamalla Cebada')">Pasamalla Cebada</button>
        <button class="tab-btn" onclick="cambiarVariable('Malta en germen')">Malta en germen</button>
    </div>

    <div id="meses-filtros">
        <button onclick="filtrarMes('todos')">Todos</button>
        <button onclick="filtrarMes(0)">Ene</button><button onclick="filtrarMes(1)">Feb</button>
        <button onclick="filtrarMes(2)">Mar</button><button onclick="filtrarMes(3)">Abr</button>
        <button onclick="filtrarMes(4)">May</button><button onclick="filtrarMes(5)">Jun</button>
        <button onclick="filtrarMes(6)">Jul</button><button onclick="filtrarMes(7)">Ago</button>
        <button onclick="filtrarMes(8)">Sep</button><button onclick="filtrarMes(9)">Oct</button>
        <button onclick="filtrarMes(10)">Nov</button><button onclick="filtrarMes(11)">Dic</button>
    </div>

    <div class="layout-principal">
        <div class="visor-container">
            <div id="stats-bar">
                <div class="stat-card"><span class="stat-label">Total registros </span><span id="stat-total" class="stat-value">0</span></div>
                <div class="stat-card"><span class="stat-label">Dentro de Spec</span><span id="stat-ok" class="stat-value" style="color: #10b981;">0</span></div>
                <div class="stat-card"><span class="stat-label">% Cumplimiento</span><span id="stat-percent" class="stat-value">0%</span></div>
                <div class="stat-card"><span class="stat-label">Pendientes</span><span id="stat-pending" class="stat-value" style="color: #ef4444;">0</span></div>
            </div>
            <div class="canvas-scroll">
                <div id="myDiv"></div>
            </div>
        </div>

        <div id="panelReaccion" class="panel-lateral">
            <div id="contenidoPlan" class="contenido-oculto">
                <h3> Plan de Reacción</h3>
                <div id="infoLote" class="badge-lote"></div>
                <input type="text" id="operador" placeholder="Nombre del Operador..." style="width:100%; padding:10px; margin-bottom:15px; border-radius:6px; border:1px solid #ccc;">
                <div id="checklist-pasos"></div>
                <textarea id="accionExtra" placeholder="Notas adicionales..." style="width:100%; margin-top:10px; height:60px; border-radius:6px; border:1px solid #ccc; padding:8px;"></textarea>
                <button id="btnEnviar" onclick="enviarReporte()" disabled>Registrar Cumplimiento</button>
                <button class="btn-cancelar" onclick="cancelarRegistro()">❌ Cancelar Selección</button>
            </div>
            <div id="mensajePlaceholder" class="placeholder-text">
                <p>Selecciona un punto <b style="color:red">rojo</b> para activar el Plan de Reacción.</p>
            </div>
        </div>
    </div>

<script>
    const planesConfig = {
        "Consumo agua recuperada": { ucl: 90, columna: "consumo agua recuperada", pasos: ["Paso 1: Cerrar manualmente válvula empuje y bombas al finalizar descarga TK.","Paso 2: Notificar 30 min antes. Confirmar niveles terraza.","Paso 3: Limpieza de línea antes y después del descargue.","Paso 4: Ajustar las Y de todo el germinador.","Paso 5: Detener carga de agua en supervisorio.","Paso 6: Poner 0% válvula potable. Verificar flujo (cerrar bypass si marca).","Paso 7: Verificar flujo recuperada >50 m3/h.","Paso 8: Si flujo <50 m3/h suplir con potable (60 m3/h)."] },
        "Consumo agua potable": { ucl: 18, columna: "consumo agua potable", pasos: ["Paso 1: Notificar 30 min previo a descarga.","Paso 2: Limpieza de línea. Limpiar 'Y' si hay residuos.","Paso 3: Ajustar conexión 'Y' (evitar pérdida presión).","Paso 4: Poner 0% válvula potable. Verificar 0 m3/h.","Paso 5: Verificar flujo recuperada >50 m3/h."] },
        "Pasamalla Malta": { ucl: 2, columna: "pasamalla malta", pasos: ["Paso 1: Retirar residuos manualmente de mallas.","Paso 2: Ajustar flujo alimentación a 7 ton/h por limpiadora.","Paso 3: Reparar mallas rotas o remaches en mal estado."] },
        "Pasamalla Cebada": { ucl: 2.8, columna: "pasamalla cebada", pasos: ["Paso 1: Limpieza inmediata malla LM-05 (SOP).","Paso 2: Reducir flujo ajustando volantes sótano TC-01.","Paso 3: Retirar atascamientos ductos ingreso tarara."] },
        "Malta en germen": { ucl: 1, columna: "malta en germen", pasos: ["Paso 1: Revisar mallas y limpiar desgerminadoras.","Paso 2: Limpieza inmediata si hay residuos.","Paso 3: Inspección cauchos y aletas. Reemplazar si hay fugas.","Paso 4: Ajustar damper aspiración (indicador vacío).","Paso 5: Inspección visual tolvas. Coordinar con Ing. Proceso."] }
    };

    const SUPABASE_URL = 'https://abzxbxjhjqzzfjvuitom.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_hhKa3cUXqc6w2-3NmoKQ9g_ixC3S7u6';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let datosCompletos = [];
    let datosActuales = [];
    let datoSeleccionado = {};
    let variableActual = "Consumo agua recuperada";
    const traductorMeses = {'jan':0,'feb':1,'mar':2,'apr':3,'may':4,'jun':5,'jul':6,'aug':7,'sep':8,'oct':9,'nov':10,'dec':11};

window.addEventListener('DOMContentLoaded', () => {
    // DATOS DE PRUEBA DIRECTOS (Sin depender de archivos externos)
    const datosPrueba = [
        { lote: "123", dia: "15", mes: "mayo", "consumo agua": 4.2 },
        { lote: "124", dia: "16", mes: "mayo", "consumo agua": 5.8 }, // Este saldría en rojo
        { lote: "125", dia: "17", mes: "mayo", "consumo agua": 4.5 }
    ];

    console.log("Cargando datos de prueba internos...");
    
    datosCompletos = datosPrueba.map(f => {
        const fl = {};
        Object.keys(f).forEach(k => fl[k.toLowerCase()] = f[k]);
        return {
            lote: String(fl['lote']),
            dia: String(fl['dia']),
            mesNum: traductorMeses[fl['mes']?.toLowerCase()] || 5,
            raw: fl
        };
    });

    cambiarVariable(variableActual);
});
    
    function cambiarVariable(nombre) {
        variableActual = nombre;
        const config = planesConfig[nombre];
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.innerText === nombre));
        datosActuales = datosCompletos.map(d => ({ ...d, y: parseFloat(d.raw[config.columna]) })).filter(d => !isNaN(d.y));
        cancelarRegistro();
        dibujarGrafica(datosActuales); 
    }

    function filtrarMes(m) {
        const config = planesConfig[variableActual];
        const base = m === 'todos' ? datosCompletos : datosCompletos.filter(d => d.mesNum === m);
        datosActuales = base.map(d => ({ ...d, y: parseFloat(d.raw[config.columna]) })).filter(d => !isNaN(d.y));
        dibujarGrafica(datosActuales);
    }

async function dibujarGrafica(datos) {
    const container = document.getElementById('myDiv');
    if (!container) return; // Seguridad por si el DOM no carga
    
    const config = planesConfig[variableActual];
    const UCL_LOCAL = config.ucl;

    // 1. Traemos los datos de Supabase
    const { data: reportes, error } = await _supabase.from('planes_reaccion').select('*');
    const bd = reportes || [];

    // 2. Estadísticas
    const total = datos.length;
    const ok = datos.filter(d => d.y <= UCL_LOCAL).length;
    const fuera = datos.filter(d => d.y > UCL_LOCAL);
    const realizados = fuera.filter(d => bd.some(r => String(r.lote_id) === String(d.lote) && r.variable === variableActual)).length;

    document.getElementById('stat-total').innerText = total;
    document.getElementById('stat-ok').innerText = ok;
    document.getElementById('stat-percent').innerText = total ? ((ok / total) * 100).toFixed(1) + "%" : "0%";
    document.getElementById('stat-pending').innerText = fuera.length - realizados;

    datos.sort((a, b) => parseInt(a.lote) - parseInt(b.lote));

    // 3. Configuración de la Gráfica
    const hoverText = datos.map(d => {
        const registro = bd.find(r => String(r.lote_id) === String(d.lote) && r.variable === variableActual);
        
        if (registro) {
            // AZUL: Prioridad a la trazabilidad (sin repetir lo que ya está en los ejes)
            const fechaGestion = new Date(registro.created_at).toLocaleString('es-CO', {
                day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
            });

            return `<b>✅ GESTIONADO</b><br>` +
                   `<b>Fecha:</b> ${fechaGestion}<br>` +
                   `<b>Por:</b> ${registro.operador}<br>` +
                   `<b>Nota:</b> ${registro.comentario || 'Sin observaciones'}`;
        } else {
            // ROJO O GRIS: Prioridad a la identificación rápida del dato
            const prefijo = (d.y > UCL_LOCAL) ? `<b>⚠️ PENDIENTE</b><br>` : `<b>✔️ DENTRO DE SPEC</b><br>`;
            
            return `${prefijo}` +
                   `<b>Lote:</b> ${d.lote}<br>` +
                   `<b>Valor:</b> ${d.y}`;
        }
    });
    
    const trace = {
        x: [datos.map(d => d.dia), datos.map(d => d.lote)],
        y: datos.map(d => d.y),
        mode: 'lines+markers+text',
        text: datos.map(d => d.y),
        hovertext: hoverText, // Aquí inyectamos el texto que creamos arriba
        hoverinfo: 'text',    // Le decimos a Plotly que solo use nuestro texto
        textposition: 'top center',
        line: { color: '#2d3748', width: 2 },
        marker: {
            size: 10,
            color: datos.map(d => {
                const tienePlan = bd.some(r => String(r.lote_id) === String(d.lote) && r.variable === variableActual);
                return (d.y > UCL_LOCAL) ? (tienePlan ? '#3182ce' : 'red') : '#2d3748';
            })
        }
    };

    const layout = {
        xaxis: { type: 'multicategory', fixedrange: true, range: [-0.5, datos.length - 0.5] },
        yaxis: { range: [0, Math.max(...datos.map(d => d.y), UCL_LOCAL + 5)], fixedrange: true },
        margin: { t: 30, b: 60, l: 40, r: 20 },
        shapes: [
            { type: 'rect', xref: 'paper', yref: 'y', x0: 0, x1: 1, y0: 0, y1: UCL_LOCAL, fillcolor: 'rgba(144, 238, 144, 0.15)', line: { width: 0 }, layer: 'below' },
            { type: 'rect', xref: 'paper', yref: 'y', x0: 0, x1: 1, y0: UCL_LOCAL, y1: 1000, fillcolor: 'rgba(255, 90, 90, 0.1)', line: { width: 0 }, layer: 'below' }
        ]
    };

    container.style.width = Math.max(datos.length * 50, 800) + "px";
    Plotly.newPlot(container, [trace], layout, { responsive: false, displayModeBar: false });

    // 4. Evento de Clic con BLOQUEO TOTAL para puntos azules
    container.removeAllListeners('plotly_click');
    container.on('plotly_click', (data) => {
        const p = data.points[0];
        
        // Solo actuamos si el punto está por encima del UCL (Rojo o Azul)
        if (p.y > UCL_LOCAL) {
            const loteClick = p.data.x[1][p.pointNumber];
            
            // VERIFICACIÓN: ¿Existe ya en Supabase para esta variable?
            const yaRegistrado = bd.some(r => 
                String(r.lote_id) === String(loteClick) && 
                r.variable === variableActual
            );

            // SI YA ESTÁ REGISTRADO (PUNTO AZUL), BLOQUEAMOS TODO
            if (yaRegistrado) {
                console.log("Acceso denegado: El lote ya tiene plan de reacción.");
                // Opcional: puedes poner un alert pequeño si quieres que el usuario sepa por qué no abre
                // alert(`El Lote ${loteClick} ya fue gestionado.`);
                cancelarRegistro(); // Cerramos cualquier panel abierto por si acaso
                return; // AQUÍ SE DETIENE TODO. No abre el panel, no carga el checklist.
            }

            // SI NO ESTÁ REGISTRADO (PUNTO ROJO), PROCEDEMOS
            datoSeleccionado = { lote: loteClick, valor: p.y, variable: variableActual };
            
            document.getElementById('checklist-pasos').innerHTML = config.pasos.map(paso => `
                <label class="step"><input type="checkbox" onchange="validarPasos()"> ${paso}</label>
            `).join('');
            
            document.getElementById('contenidoPlan').style.display = 'block';
            document.getElementById('mensajePlaceholder').style.display = 'none';
            document.getElementById('infoLote').innerText = `${variableActual}: LOTE ${datoSeleccionado.lote}`;
            document.getElementById('operador').value = "";
            validarPasos();
        }
    });
    }

    async function enviarReporte() {
        const btn = document.getElementById('btnEnviar');
        btn.disabled = true; btn.innerText = "Enviando...";
        const { error } = await _supabase.from('planes_reaccion').insert([{ 
            lote_id: String(datoSeleccionado.lote), 
            valor: datoSeleccionado.valor, 
            variable: variableActual,
            operador: document.getElementById('operador').value,
            comentario: document.getElementById('accionExtra').value 
        }]);
        if (error) { alert("Error: " + error.message); btn.disabled = false; btn.innerText = "Registrar Cumplimiento"; }
        else { alert("Plan registrado."); cancelarRegistro(); cambiarVariable(variableActual); }
    }

    function cancelarRegistro() { 
        document.getElementById('contenidoPlan').style.display = 'none'; 
        document.getElementById('mensajePlaceholder').style.display = 'flex'; 
        datoSeleccionado = {}; 
    }

    function validarPasos() {
        const checks = document.querySelectorAll('#checklist-pasos input:checked').length;
        const total = document.querySelectorAll('#checklist-pasos input').length;
        const op = document.getElementById('operador').value.trim() !== "";
        const btn = document.getElementById('btnEnviar');
        btn.disabled = !(checks === total && op);
        btn.className = (checks === total && op) ? 'active' : '';
    }

    function descargarReportes() {
        _supabase.from('planes_reaccion').select('*').then(({data}) => {
            if(!data.length) return alert("No hay datos");
            const csv = "Variable,Lote,Valor,Operador,Comentario\n" + data.map(r => `${r.variable},${r.lote_id},${r.valor},${r.operador},${r.comentario}`).join("\n");
            const blob = new Blob(["\uFEFF" + csv], {type: 'text/csv;charset=utf-8;'});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "Reporte_Supabase.csv"; a.click();
        });
    }

    function limpiarBaseDatos() { alert("Para borrar datos debes hacerlo desde el panel de Supabase por seguridad."); }
</script>
</body>
</html>
