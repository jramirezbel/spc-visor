<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Control SPC - v3.0</title>
    
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f4f7f6; color: #333; overflow-x: hidden; }
        .header-container { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: white; border-bottom: 1px solid #e2e8f0; }
        .panel-reportes { display: flex; gap: 10px; }
        .btn-descargar { background: #38a169; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-limpiar { background: #e53e3e; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        
        .tabs-container { display: flex; gap: 10px; padding: 15px 20px; background: white; flex-wrap: wrap; border-bottom: 1px solid #e2e8f0; }
        .tab-btn { padding: 10px 20px; border: none; background: #edf2f7; color: #4a5568; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: #3182ce; color: white; }

        #meses-filtros { padding: 10px 20px; background: #fff; }
        #meses-filtros button { padding: 6px 12px; margin: 2px; cursor: pointer; background: white; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 12px; }
        #meses-filtros button:hover { background: #f7fafc; }

        .layout-principal { display: flex; height: calc(100vh - 180px); width: 100vw; }
        
        .visor-container { flex: 8; display: flex; flex-direction: column; background: white; border-right: 1px solid #e2e8f0; }
        #stats-bar { display: flex; justify-content: space-around; padding: 15px; border-bottom: 1px solid #f1f5f9; background: #fafcfe; }
        .stat-card { text-align: center; flex: 1; }
        .stat-label { display: block; font-size: 10px; color: #64748b; font-weight: bold; text-transform: uppercase; }
        .stat-value { font-size: 22px; font-weight: bold; color: #1e293b; }

        .canvas-scroll { flex: 1; overflow-x: auto; overflow-y: hidden; width: 100%; }
        #myDiv { height: 100%; width: 100%; }

        .panel-lateral { flex: 2; background: white; padding: 20px; overflow-y: auto; box-shadow: -2px 0 5px rgba(0,0,0,0.05); }
        .badge-lote { background: #e53e3e; color: white; padding: 6px 12px; border-radius: 20px; font-weight: bold; display: inline-block; margin-bottom: 15px; width: 100%; text-align: center; box-sizing: border-box; }
        .step { display: block; background: #f8fafc; padding: 10px; margin-bottom: 8px; border-radius: 8px; font-size: 12px; border: 1px solid #edf2f7; cursor: pointer; }
        #btnEnviar { width: 100%; padding: 14px; margin-top: 10px; background: #ccc; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: not-allowed; }
        #btnEnviar.active { background: #38a169; cursor: pointer; }
        .btn-cancelar { width: 100%; padding: 10px; margin-top: 8px; background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; border-radius: 8px; cursor: pointer; }
        .contenido-oculto { display: none; }
        .placeholder-text { display: flex; align-items: center; justify-content: center; height: 100%; color: #a0aec0; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div class="header-container">
        <div><h2 style="margin:0; font-size: 1.2rem;">Control Chart SPC v3.0</h2></div>
        <div class="panel-reportes">
            <button onclick="descargarReportes()" class="btn-descargar">📥 Exportar CSV</button>
            <button onclick="limpiarBaseDatos()" class="btn-limpiar">🗑️ Limpiar</button>
        </div>
    </div>
    
    <div class="tabs-container" id="tabs"></div>

    <div id="meses-filtros">
        <button onclick="filtrarMes('todos')">Todos</button>
        <button onclick="filtrarMes(0)">Ene</button><button onclick="filtrarMes(1)">Feb</button>
        <button onclick="filtrarMes(2)">Mar</button><button onclick="filtrarMes(3)">Abr</button>
        <button onclick="filtrarMes(4)">May</button><button onclick="filtrarMes(5)">Jun</button>
        <button onclick="filtrarMes(6)">Jul</button><button onclick="filtrarMes(7)">Ago</button>
        <button onclick="filtrarMes(8)">Sep</button><button onclick="filtrarMes(9)">Oct</button>
        <button onclick="filtrarMes(10)">Nov</button><button onclick="filtrarMes(11)">Dic</button>
    </div>

    <div class="layout-principal">
        <div class="visor-container">
            <div id="stats-bar">
                <div class="stat-card"><span class="stat-label">Registros</span><span id="stat-total" class="stat-value">0</span></div>
                <div class="stat-card"><span class="stat-label">Dentro de Spec</span><span id="stat-ok" class="stat-value" style="color: #10b981;">0</span></div>
                <div class="stat-card"><span class="stat-label">% Cumplimiento</span><span id="stat-percent" class="stat-value">0%</span></div>
                <div class="stat-card"><span class="stat-label">Pendientes</span><span id="stat-pending" class="stat-value" style="color: #ef4444;">0</span></div>
            </div>
            <div class="canvas-scroll">
                <div id="myDiv"></div>
            </div>
        </div>

        <div id="panelReaccion" class="panel-lateral">
            <div id="contenidoPlan" class="contenido-oculto">
                <h3>Plan de Reacción</h3>
                <div id="infoLote" class="badge-lote"></div>
                <input type="text" id="operador" oninput="validarPasos()" placeholder="Nombre del Operador..." style="width:100%; padding:10px; margin-bottom:15px; border-radius:6px; border:1px solid #ccc; box-sizing: border-box;">
                <div id="checklist-pasos"></div>
                <textarea id="accionExtra" placeholder="Notas adicionales..." style="width:100%; margin-top:10px; height:60px; border-radius:6px; border:1px solid #ccc; padding:8px; box-sizing: border-box;"></textarea>
                <button id="btnEnviar" onclick="enviarReporte()" disabled>Registrar Cumplimiento</button>
                <button class="btn-cancelar" onclick="cancelarRegistro()">❌ Cancelar Selección</button>
            </div>
            <div id="mensajePlaceholder" class="placeholder-text">
                <p>Haz clic en un punto <b>ROJO</b> para registrar acciones correctivas.</p>
            </div>
        </div>
    </div>

<script>
    const SUPABASE_URL = 'https://abzxbxjhjqzzfjvuitom.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_hhKa3cUXqc6w2-3NmoKQ9g_ixC3S7u6';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const planesConfig = {
        "Consumo agua recuperada": { ucl: 90, columna: "consumo agua recuperada", pasos: ["Cerrar válvulas empuje/bombas","Notificar niveles terraza","Limpieza de línea","Ajustar Y germinador","Detener carga agua","Verificar flujo >50 m3/h"] },
        "Consumo agua potable": { ucl: 18, columna: "consumo agua potable", pasos: ["Notificar 30min previo","Limpiar filtros Y","Ajustar conexión presión","Válvula 0% - Verificar"] },
        "Pasamalla Malta": { ucl: 2, columna: "pasamalla malta", pasos: ["Limpieza manual mallas","Flujo a 7 ton/h","Reparar mallas rotas"] },
        "Pasamalla Cebada": { ucl: 2.8, columna: "pasamalla cebada", pasos: ["Limpiar malla LM-05","Reducir flujo sótano","Limpiar ductos tarara"] },
        "Malta en germen": { ucl: 1, columna: "malta en germen", pasos: ["Revisar desgerminadoras","Limpiar residuos","Ajustar damper aspiración","Inspección visual tolvas"] }
    };

    const traductorMeses = { 'jan':0, 'feb':1, 'mar':2, 'apr':3, 'may':4, 'jun':5, 'jul':6, 'aug':7, 'sep':8, 'oct':9, 'nov':10, 'dec':11, 'ene':0, 'abr':3, 'ago':7, 'dic':11, 'december':11, 'mayo':4 };

    let datosCompletos = [];
    let variableActual = "Consumo agua recuperada";
    let datoSeleccionado = {};
    let mesFiltro = 'todos';

    // Generar pestañas dinámicamente
    const tabsContainer = document.getElementById('tabs');
    Object.keys(planesConfig).forEach((key, index) => {
        const btn = document.createElement('button');
        btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
        btn.innerText = key;
        btn.onclick = () => cambiarVariable(key);
        tabsContainer.appendChild(btn);
    });

    async function cargarDatosMaestros() {
        try {
            const { data, error } = await _supabase.from('produccion').select('*');
            if (error) throw error;

            datosCompletos = data.map(f => {
                const fl = {};
                Object.keys(f).forEach(k => {
                    let val = f[k];
                    if (typeof val === 'string' && val.includes(',')) val = parseFloat(val.replace(',', '.'));
                    fl[k.trim().toLowerCase()] = val;
                });
                return {
                    lote: String(fl['lote'] || ''),
                    dia: String(fl['dia'] || ''),
                    mes: String(fl['mes'] || '').toLowerCase(),
                    mesNum: traductorMeses[fl['mes']?.toString().toLowerCase().trim()] ?? -1,
                    raw: fl
                };
            }).filter(d => d.lote !== '');

            cambiarVariable(variableActual);
        } catch (err) {
            console.error("Error:", err);
            alert("Error de conexión con Supabase");
        }
    }

    function cambiarVariable(nombre) {
        variableActual = nombre;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText === nombre));
        cancelarRegistro();
        filtrarMes(mesFiltro);
    }

    function filtrarMes(m) {
        mesFiltro = m;
        const config = planesConfig[variableActual];
        const base = m === 'todos' ? datosCompletos : datosCompletos.filter(d => d.mesNum === m);
        const filtrados = base.map(d => ({ ...d, y: parseFloat(d.raw[config.columna]) })).filter(d => !isNaN(d.y));
        dibujarGrafica(filtrados);
    }

    async function dibujarGrafica(datos) {
        const config = planesConfig[variableActual];
        const { data: reportes } = await _supabase.from('planes_reaccion').select('*');
        const bd = reportes || [];

        const ok = datos.filter(d => d.y <= config.ucl).length;
        const fuera = datos.filter(d => d.y > config.ucl);
        const realizados = fuera.filter(d => bd.some(r => String(r.lote_id) === String(d.lote) && r.variable === variableActual)).length;

        document.getElementById('stat-total').innerText = datos.length;
        document.getElementById('stat-ok').innerText = ok;
        document.getElementById('stat-percent').innerText = datos.length ? ((ok / datos.length) * 100).toFixed(1) + "%" : "0%";
        document.getElementById('stat-pending').innerText = fuera.length - realizados;

        datos.sort((a, b) => parseInt(a.lote) - parseInt(b.lote));

        // Construir etiquetas flotantes (Hover)
        const textHover = datos.map(d => {
            const r = bd.find(r => String(r.lote_id) === String(d.lote) && r.variable === variableActual);
            let txt = `Lote: ${d.lote}<br>Valor: ${d.y}<br>Fecha: ${d.dia} ${d.mes.toUpperCase()}`;
            if (r) txt += `<br><br><b>GESTIONADO POR:</b><br>${r.operador}<br>ID: ${r.id}`;
            return txt;
        });

        const trace = {
            x: [datos.map(d => d.dia), datos.map(d => d.lote)],
            y: datos.map(d => d.y),
            mode: 'lines+markers+text',
            text: datos.map(d => d.y),
            textposition: 'top center',
            hoverinfo: 'text',
            hovertext: textHover,
            line: { color: '#4a5568', width: 2 },
            marker: {
                size: 12,
                color: datos.map(d => {
                    const gestionado = bd.some(r => String(r.lote_id) === String(d.lote) && r.variable === variableActual);
                    return (d.y > config.ucl) ? (gestionado ? '#3182ce' : '#e53e3e') : '#2d3748';
                }),
                line: { width: 1, color: 'white' }
            }
        };

        const layout = {
            xaxis: { type: 'multicategory', fixedrange: false, automargin: true },
            yaxis: { range: [0, Math.max(...datos.map(d => d.y), config.ucl) * 1.2], fixedrange: true, gridcolor: '#f1f5f9' },
            margin: { t: 20, b: 50, l: 50, r: 20 },
            autosize: true,
            plot_bgcolor: 'white',
            paper_bgcolor: 'white',
            shapes: [
                { type: 'rect', xref: 'paper', yref: 'y', x0: 0, x1: 1, y0: 0, y1: config.ucl, fillcolor: 'rgba(72, 187, 120, 0.15)', line: {width:0}, layer:'below' },
                { type: 'rect', xref: 'paper', yref: 'y', x0: 0, x1: 1, y0: config.ucl, y1: 500, fillcolor: 'rgba(245, 101, 101, 0.1)', line: {width:0}, layer:'below' },
                { type: 'line', xref: 'paper', yref: 'y', x0: 0, x1: 1, y0: config.ucl, line: { color: 'red', width: 2, dash: 'dash' } }
            ]
        };

        const div = document.getElementById('myDiv');
        div.style.width = Math.max(datos.length * 45, window.innerWidth * 0.75) + "px";
        Plotly.newPlot(div, [trace], layout, { displayModeBar: false, responsive: true });

        div.removeAllListeners('plotly_click');
        div.on('plotly_click', (data) => {
            const p = data.points[0];
            if (p.y > config.ucl) {
                const lote = p.data.x[1][p.pointNumber];
                if (bd.some(r => String(r.lote_id) === String(lote) && r.variable === variableActual)) return;
                
                datoSeleccionado = { lote, valor: p.y, variable: variableActual };
                document.getElementById('infoLote').innerText = `ACCION REQUERIDA: LOTE ${lote}`;
                document.getElementById('checklist-pasos').innerHTML = config.pasos.map(paso => `<label class="step"><input type="checkbox" onchange="validarPasos()"> ${paso}</label>`).join('');
                document.getElementById('contenidoPlan').style.display = 'block';
                document.getElementById('mensajePlaceholder').style.display = 'none';
            }
        });
    }

    async function enviarReporte() {
        const btn = document.getElementById('btnEnviar');
        btn.disabled = true; btn.innerText = "Registrando...";
        const { error } = await _supabase.from('planes_reaccion').insert([{ 
            lote_id: String(datoSeleccionado.lote), 
            valor: datoSeleccionado.valor, 
            variable: variableActual, 
            operador: document.getElementById('operador').value,
            comentario: document.getElementById('accionExtra').value 
        }]);
        if (error) { alert(error.message); btn.disabled = false; btn.innerText = "Registrar Cumplimiento"; }
        else { alert("✅ Gestión registrada exitosamente"); cargarDatosMaestros(); }
    }

    function cancelarRegistro() {
        document.getElementById('contenidoPlan').style.display = 'none';
        document.getElementById('mensajePlaceholder').style.display = 'flex';
        document.getElementById('operador').value = "";
        document.getElementById('accionExtra').value = "";
        datoSeleccionado = {};
    }

    function validarPasos() {
        const total = document.querySelectorAll('#checklist-pasos input').length;
        const marcados = document.querySelectorAll('#checklist-pasos input:checked').length;
        const op = document.getElementById('operador').value.trim() !== "";
        const btn = document.getElementById('btnEnviar');
        btn.disabled = !(total === marcados && op);
        btn.className = (total === marcados && op) ? 'active' : '';
    }

    function descargarReportes() {
        _supabase.from('planes_reaccion').select('*').then(({data}) => {
            if(!data.length) return alert("No hay datos");
            const csv = "Variable,Lote,Valor,Operador,Fecha_Registro\n" + data.map(r => `${r.variable},${r.lote_id},${r.valor},${r.operador},${r.created_at}`).join("\n");
            const blob = new Blob(["\ufeff" + csv], {type: 'text/csv'});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "reporte_gestion.csv"; a.click();
        });
    }

    function limpiarBaseDatos() { alert("Acceso restringido. Borre datos directamente en el panel de Supabase."); }

    window.onload = cargarDatosMaestros;
</script>
</body>
</html>
