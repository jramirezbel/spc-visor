<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Control SPC - v3.1 Final</title>
    
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* ELIMINAR ESPACIOS BORDES */
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; overflow-x: hidden; }
        
        .header-container { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: white; border-bottom: 1px solid #e2e8f0; }
        .tabs-container { display: flex; gap: 8px; padding: 10px 20px; background: white; flex-wrap: wrap; }
        
        .tab-btn { padding: 8px 16px; border: none; background: #edf2f7; color: #4a5568; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .tab-btn.active { background: #3182ce; color: white; }

        .layout-principal { display: flex; height: calc(100vh - 160px); width: 100vw; }
        
        /* CONTENEDOR GRÁFICA */
        .visor-container { flex: 3; display: flex; flex-direction: column; background: white; }
        #stats-bar { display: flex; justify-content: space-around; padding: 10px; border-bottom: 1px solid #f1f5f9; background: #fafcfe; }
        .stat-card { text-align: center; }
        .stat-label { display: block; font-size: 9px; color: #64748b; font-weight: bold; text-transform: uppercase; }
        .stat-value { font-size: 20px; font-weight: bold; }

        .canvas-scroll { flex: 1; overflow-x: auto; width: 100%; }
        #myDiv { height: 100%; min-width: 100%; }

        /* PANEL LATERAL */
        .panel-lateral { width: 320px; background: white; border-left: 1px solid #e2e8f0; padding: 20px; overflow-y: auto; }
        .badge-lote { background: #e53e3e; color: white; padding: 8px; border-radius: 6px; font-weight: bold; display: block; margin-bottom: 15px; text-align: center; }
        .step { display: block; background: #f8fafc; padding: 10px; margin-bottom: 8px; border-radius: 8px; font-size: 12px; border: 1px solid #edf2f7; }
        
        #btnEnviar { width: 100%; padding: 12px; background: #ccc; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: not-allowed; }
        #btnEnviar.active { background: #38a169; cursor: pointer; }
        .btn-cancelar { width: 100%; padding: 8px; margin-top: 8px; background: none; color: #c53030; border: 1px solid #feb2b2; border-radius: 8px; cursor: pointer; font-size: 12px; }
        .placeholder-text { color: #a0aec0; text-align: center; margin-top: 100px; }
    </style>
</head>
<body>

    <div class="header-container">
        <h2 style="margin:0; font-size: 1.1rem;">SICs Control Chart</h2>
        <div>
            <button onclick="descargarReportes()" style="background:#38a169; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-weight:bold;">Exportar Datos</button>
        </div>
    </div>
    
    <div class="tabs-container" id="tabs-main"></div>

    <div class="layout-principal">
        <div class="visor-container">
            <div id="stats-bar">
                <div class="stat-card"><span class="stat-label">Registros</span><span id="stat-total" class="stat-value">0</span></div>
                <div class="stat-card"><span class="stat-label">OK</span><span id="stat-ok" class="stat-value" style="color:#10b981;">0</span></div>
                <div class="stat-card"><span class="stat-label">Cumplimiento</span><span id="stat-percent" class="stat-value">0%</span></div>
                <div class="stat-card"><span class="stat-label">Pendientes</span><span id="stat-pending" class="stat-value" style="color:#ef4444;">0</span></div>
            </div>
            <div class="canvas-scroll">
                <div id="myDiv"></div>
            </div>
        </div>

        <div class="panel-lateral">
            <div id="contenidoPlan" style="display:none;">
                <h3 style="margin-top:0">Plan de Reacción</h3>
                <div id="infoLote" class="badge-lote"></div>
                <input type="text" id="operador" oninput="validarPasos()" placeholder="Nombre del Operador..." style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:4px;">
                <div id="checklist-pasos"></div>
                <textarea id="accionExtra" placeholder="Comentarios..." style="width:100%; height:60px; margin-top:10px; border:1px solid #ccc; border-radius:4px; padding:5px;"></textarea>
                <button id="btnEnviar" onclick="enviarReporte()" disabled>Registrar Plan</button>
                <button class="btn-cancelar" onclick="cancelarRegistro()">Cancelar</button>
            </div>
            <div id="mensajePlaceholder" class="placeholder-text">
                <p>Selecciona un punto <b style="color:#e53e3e">rojo</b> para actuar.</p>
            </div>
        </div>
    </div>

<script>
    const SUPABASE_URL = 'https://abzxbxjhjqzzfjvuitom.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_hhKa3cUXqc6w2-3NmoKQ9g_ixC3S7u6';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const planesConfig = {
        "Consumo agua recuperada": { ucl: 90, columna: "consumo agua recuperada", pasos: ["Cerrar válvulas descarga","Notificar niveles terraza","Limpieza de línea","Verificar flujo >50 m3/h"] },
        "Consumo agua potable": { ucl: 18, columna: "consumo agua potable", pasos: ["Limpiar filtros Y","Revisar bypass","Válvula 0% - Verificar"] },
        "Pasamalla Malta": { ucl: 2, columna: "pasamalla malta", pasos: ["Limpieza manual mallas","Ajustar flujo 7 ton/h"] },
        "Pasamalla Cebada": { ucl: 2.8, columna: "pasamalla cebada", pasos: ["Limpiar malla LM-05","Reducir flujo sótano"] },
        "Malta en germen": { ucl: 1, columna: "malta en germen", pasos: ["Revisar desgerminadoras","Limpiar residuos","Ajustar damper vacio"] }
    };

    let datosCompletos = [];
    let variableActual = Object.keys(planesConfig)[0];
    let seleccionado = null;

    // Crear pestañas
    const tabs = document.getElementById('tabs-main');
    Object.keys(planesConfig).forEach(k => {
        const b = document.createElement('button');
        b.className = `tab-btn ${k === variableActual ? 'active' : ''}`;
        b.innerText = k;
        b.onclick = () => {
            document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            variableActual = k;
            render();
        };
        tabs.appendChild(b);
    });

    async function cargar() {
        const { data, error } = await _supabase.from('produccion').select('*');
        if (error) return console.error(error);
        
        datosCompletos = data.map(f => {
            const row = {};
            Object.keys(f).forEach(k => {
                let v = f[k];
                if (typeof v === 'string' && v.includes(',')) v = parseFloat(v.replace(',', '.'));
                row[k.trim().toLowerCase()] = v;
            });
            return row;
        }).filter(r => r.lote);
        render();
    }

    async function render() {
        const config = planesConfig[variableActual];
        const { data: reportes } = await _supabase.from('planes_reaccion').select('*');
        const bd = reportes || [];

        const dPlot = datosCompletos.map(d => ({
            lote: String(d.lote),
            dia: String(d.dia),
            mes: String(d.mes || '').toUpperCase(),
            y: parseFloat(d[config.columna])
        })).filter(d => !isNaN(d.y)).sort((a,b) => a.lote - b.lote);

        const okCount = dPlot.filter(d => d.y <= config.ucl).length;
        const fuera = dPlot.filter(d => d.y > config.ucl);
        const listos = fuera.filter(d => bd.some(r => String(r.lote_id) === d.lote && r.variable === variableActual)).length;

        document.getElementById('stat-total').innerText = dPlot.length;
        document.getElementById('stat-ok').innerText = okCount;
        document.getElementById('stat-percent').innerText = dPlot.length ? Math.round((okCount/dPlot.length)*100) + "%" : "0%";
        document.getElementById('stat-pending').innerText = fuera.length - listos;

        const hovers = dPlot.map(d => {
            const gestion = bd.find(r => String(r.lote_id) === d.lote && r.variable === variableActual);
            let h = `<b>Lote ${d.lote}</b><br>Valor: ${d.y}<br>Fecha: ${d.dia} ${d.mes}`;
            if(gestion) h += `<br><br><span style="color:#3182ce">GESTIONADO POR:</span><br>${gestion.operador}`;
            return h;
        });

        const trace = {
            x: dPlot.map(d => `L${d.lote}<br>${d.dia}-${d.mes}`),
            y: dPlot.map(d => d.y),
            mode: 'lines+markers+text',
            text: dPlot.map(d => d.y),
            textposition: 'top center',
            hoverinfo: 'text',
            hovertext: hovers,
            line: { color: '#4a5568', width: 2 },
            marker: {
                size: 12,
                color: dPlot.map(d => {
                    const gest = bd.some(r => String(r.lote_id) === d.lote && r.variable === variableActual);
                    return d.y > config.ucl ? (gest ? '#3182ce' : '#e53e3e') : '#2d3748';
                }),
                line: { width: 2, color: 'white' }
            }
        };

        const layout = {
            margin: { t: 30, b: 80, l: 40, r: 20 },
            xaxis: { fixedrange: false, tickfont: { size: 10 } },
            yaxis: { range: [0, Math.max(...dPlot.map(d => d.y), config.ucl) * 1.3], gridcolor: '#f0f0f0' },
            plot_bgcolor: 'white',
            paper_bgcolor: 'white',
            shapes: [
                { type: 'rect', xref: 'paper', yref: 'y', x0: 0, x1: 1, y0: 0, y1: config.ucl, fillcolor: 'rgba(72, 187, 120, 0.08)', line: {width:0}, layer:'below' },
                { type: 'rect', xref: 'paper', yref: 'y', x0: 0, x1: 1, y0: config.ucl, y1: 1000, fillcolor: 'rgba(245, 101, 101, 0.05)', line: {width:0}, layer:'below' },
                { type: 'line', xref: 'paper', yref: 'y', x0: 0, x1: 1, y0: config.ucl, line: { color: '#e53e3e', width: 2, dash: 'dash' } }
            ]
        };

        const div = document.getElementById('myDiv');
        div.style.width = Math.max(dPlot.length * 60, window.innerWidth - 320) + "px";
        Plotly.newPlot(div, [trace], layout, { displayModeBar: false, responsive: true });

        div.on('plotly_click', (data) => {
            const p = data.points[0];
            if (p.y > config.ucl) {
                const loteId = p.x.split('<br>')[0].replace('L', '');
                if (bd.some(r => String(r.lote_id) === loteId && r.variable === variableActual)) return;
                
                seleccionado = { lote: loteId, valor: p.y };
                document.getElementById('infoLote').innerText = `LOTE: ${loteId} (Valor: ${p.y})`;
                document.getElementById('checklist-pasos').innerHTML = config.pasos.map(s => `<label class="step"><input type="checkbox" onchange="validarPasos()"> ${s}</label>`).join('');
                document.getElementById('contenidoPlan').style.display = 'block';
                document.getElementById('mensajePlaceholder').style.display = 'none';
            }
        });
    }

    async function enviarReporte() {
        const { error } = await _supabase.from('planes_reaccion').insert([{ 
            lote_id: seleccionado.lote, 
            valor: seleccionado.valor, 
            variable: variableActual, 
            operador: document.getElementById('operador').value,
            comentario: document.getElementById('accionExtra').value 
        }]);
        if(!error) { alert("¡Guardado!"); cancelarRegistro(); cargar(); }
    }

    function cancelarRegistro() {
        document.getElementById('contenidoPlan').style.display = 'none';
        document.getElementById('mensajePlaceholder').style.display = 'block';
        document.getElementById('operador').value = "";
        seleccionado = null;
    }

    function validarPasos() {
        const total = document.querySelectorAll('#checklist-pasos input').length;
        const checks = document.querySelectorAll('#checklist-pasos input:checked').length;
        const op = document.getElementById('operador').value.trim().length > 2;
        const btn = document.getElementById('btnEnviar');
        btn.disabled = !(total === checks && op);
        btn.classList.toggle('active', !btn.disabled);
    }

    window.onload = cargar;
</script>
</body>
</html>
